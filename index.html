<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SHA-256 Browser Benchmark</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <header>
      <h1>SHA-256 Browser Benchmark</h1>
      <p class="subtitle">Compare incremental hashing solutions for browsers</p>
    </header>

    <main>
      <section class="controls">
        <div id="drop-zone" class="drop-zone" tabindex="0">
          <p>Drop a file here or click to browse</p>
          <input id="file-input" type="file" hidden />
        </div>

        <div class="file-list" id="file-list"></div>

        <div class="actions">
          <label>
            Iterations
            <input id="iterations" type="number" min="1" max="10" value="1" />
          </label>
          <label class="chunk-sizes-label">
            Chunk sizes (KB)
            <input
              id="chunk-sizes"
              type="text"
              value="1024"
              placeholder="e.g. 64, 128, 256, 1024"
            />
          </label>
          <label>
            <input id="sync-mode" type="checkbox" />
            Use OPFS sync access
          </label>
          <button id="run-btn" type="button" disabled>Run benchmark</button>
          <button id="clear-btn" type="button" disabled>Clear</button>
        </div>
      </section>

      <section class="progress-section" id="progress-section" hidden>
        <h2>Progress</h2>
        <div id="progress-bars"></div>
      </section>

      <section class="results-section">
        <h2>Results</h2>
        <table id="results-table">
          <thead>
            <tr>
              <th>File</th>
              <th>Size</th>
              <th>Implementation</th>
              <th>Chunk</th>
              <th>Iteration</th>
              <th>Time</th>
              <th>Throughput</th>
              <th>Hash</th>
              <th>Match</th>
            </tr>
          </thead>
          <tbody id="results-body"></tbody>
        </table>
        <div id="summary" class="summary" hidden></div>
      </section>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
